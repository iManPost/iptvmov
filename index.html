<style>
  body {
    background-color: #121212; /* โหมดมืด */
    color: #fff;
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 20px;
  }

  h1 {
    text-align: center;
    margin-bottom: 20px;
  }

  /* ส่วนวิดีโอหลัก */
  .video-section {
    display: flex;
    justify-content: center;
    margin-bottom: 20px;
  }

  video {
    width: 100%;
    Height: 220px;
    max-width: 400px;
    border-radius: 8px;
  }

  /* รายการปกหนังด้านล่าง */
  .thumbnails {
    display: flex;
    overflow-x: auto;
    gap: 10px;
    padding-bottom: 10px;
  }

  .thumbnail {
    flex: 0 0 auto;
    width: 150px;
    cursor: pointer;
    border-radius: 8px;
    transition: transform 0.2s;
  }

  .thumbnail:hover {
    transform: scale(1.05);
  }

  /* ปุ่มควบคุมด้านล่าง */
  #controls {
    display: flex;
    justify-content: center;
    margin-top: 10px;
  }

  button {
    background-color: #333;
    color: #fff;
    border: none;
    padding: 10px 20px;
    margin: 0 5px;
    border-radius: 4px;
    cursor: pointer;
  }

  button:hover {
    background-color: #555;
  }
</style>
</head>
<!-- ใส่โค้ดนี้ไว้ก่อนปิดแท็ก </body> -->
<script>
    // 1. ป้องกันการคลิกขวา (Disable Right Click)
    document.addEventListener('contextmenu', function(e) {
        e.preventDefault();
    });

    // 2. ป้องกันปุ่มคีย์บอร์ดลัด (Disable Shortcuts: F12, Ctrl+Shift+I, Ctrl+Shift+J, Ctrl+U)
    document.addEventListener('keydown', function(e) {
        // บล็อก F12
        if (e.key === "F12") {
            e.preventDefault();
        }
        // บล็อก Ctrl + Shift + I (เปิด DevTools)
        if (e.ctrlKey && e.shiftKey && e.key === 'I') {
            e.preventDefault();
        }
        // บล็อก Ctrl + Shift + J (เปิด Console)
        if (e.ctrlKey && e.shiftKey && e.key === 'J') {
            e.preventDefault();
        }
        // บล็อก Ctrl + U (ดู Source Code)
        if (e.ctrlKey && e.key === 'u') {
            e.preventDefault();
        }
        // บล็อก Ctrl + S (เซฟหน้าเว็บ)
        if (e.ctrlKey && e.key === 's') {
            e.preventDefault();
        }
    });
</script>

const fullscreenBtn = document.getElementById('fullscreenBtn');  
const thumbnails = document.querySelectorAll('.thumbnail');

// ดึงข้อความจาก alt ของรูปภาพมาแสดงใต้ภาพอัตโนมัติ
const thumbnail = document.querySelector('.thumbnail');
const videoTitle = document.querySelector('.video-title');
if (thumbnail && videoTitle) {
  videoTitle.textContent = thumbnail.alt;
}
    
  
let currentSrc = '';

thumbnails.forEach(thumb => {
  thumb.addEventListener('click', () => {
    const src = thumb.getAttribute('data-src');
    currentSrc = src;
    if (Hls.isSupported()) {
      const hls = new Hls();
      hls.loadSource(src);
      hls.attachMedia(video);
    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
      video.src = src;
    }
    video.play();
  });
});

// ปุ่มเล่น/หยุด
document.getElementById('playBtn').addEventListener('click', () => {
  if (video.paused) {
    video.play();
  } else {
    video.pause();
  }
});

// ปุ่มเปิด/ปิดเสียง
document.getElementById('muteBtn').addEventListener('click', () => {
  video.muted = !video.muted;
});


// ปุ่มเปิด/เต็มจอ
document.getElementById('fullscreenBtn').addEventListener('click', () => {
  if (!document.fullscreenElement) {
    video.requestFullscreen().catch(err => {
      console.error(`Error entering fullscreen: ${err.message}`);
    });
  } else {
    document.exitFullscreen();
  }
});

// ปุ่มย้อนกลับไป 10 วินาที (Rewind)
document.getElementById('rewindBtn').addEventListener('click', () => {
  video.currentTime = Math.max(0, video.currentTime - 10);
});

// ปุ่มข้ามไปข้างหน้า 10 วินาที (Fast Forward)
document.getElementById('forwardBtn').addEventListener('click', () => {
  video.currentTime = Math.min(video.duration, video.currentTime + 10);
});

  
</script>
